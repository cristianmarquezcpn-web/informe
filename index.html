<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Informes - Esencial Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 30px; max-width: 1000px; margin: 0 auto; }
        h2 { color: #1a2a6c; margin-bottom: 20px; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; }
        select, textarea, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; }
        select { background: white; cursor: pointer; }
        textarea { min-height: 100px; font-family: inherit; resize: vertical; }
        button { background: #1a2a6c; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #3b82f6; transform: scale(1.01); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .loading { text-align: center; padding: 20px; color: #64748b; }
        .stats { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .stat-item { background: #e2e8f0; padding: 8px 15px; border-radius: 8px; font-size: 12px; }
        
        /* Estilos del modal de login */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 42, 108, 0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Estilos del editor */
        #editor-container { height: 400px; background: white; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .ql-toolbar { border-top-left-radius: 8px; border-top-right-radius: 8px; background: #f8fafc; }
    </style>
</head>
<body>
<div id="login-overlay">
    <div class="login-box">
        <h2 style="border:none; color:#1a2a6c;">ESENCIAL</h2>
        <p style="margin-bottom: 20px; color: #64748b;">Acceso seguro con cuenta de Google</p>
        
        <!-- Botón de Google -->
        <button onclick="iniciarSesionGoogle()" style="background: #ffffff; color: #555; border: 1px solid #ccc; font-weight: bold;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" style="width:20px; margin-right:10px;">
            INGRESAR CON GOOGLE
        </button>
    </div>
</div>

    <div id="app-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>📋 Generador de Informes Profesionales</h2>
            <button onclick="cerrarSesion()" style="width: auto; background: #ef4444; padding: 8px 15px;">Salir</button>
        </div>
        
        <div class="card">
            <div class="grid">
                <div>
                    <label><b>Módulo:</b></label>
                    <select id="mod" onchange="listarPacientes()">
                        <option value="cd">Centro de Día (CD)</option>
                        <option value="cet">CET</option>
                        <option value="rehab">Rehabilitación (REHAB)</option>
                    </select>
                </div>
                <div>
                    <label><b>Paciente:</b></label>
                    <select id="paciente-select" onchange="cargarDatosPaciente()">
                        <option value="">Seleccionar paciente...</option>
                    </select>
                </div>
            </div>
            
            <div class="stats">
                <span class="stat-item" id="stats-pacientes">👥 0 pacientes</span>
                <span class="stat-item" id="stats-cud">📅 0 CUD activos</span>
            </div>
        </div>
        
        <div class="card" id="datos-paciente" style="display:none;">
            <h3 style="margin-bottom:10px;">📄 Datos del paciente: <span id="nombre-paciente"></span></h3>
            <div id="info-paciente" style="margin-bottom:15px; font-size:13px; background:#f8fafc; padding:12px; border-radius:8px;"></div>
            
            <!-- NUEVOS CAMPOS DEL INFORME TRIMESTRAL -->
            <div class="grid">
                <div>
                    <label><b>● ÁREA:</b></label>
                    <input type="text" id="area-rep" placeholder="Ej: Psicología, Terapia Ocupacional...">
                </div>
                <div>
                    <label><b>● PROFESIONAL:</b></label>
                    <input type="text" id="profesional-rep" placeholder="Nombre completo del profesional">
                </div>
            </div>
            
            <div style="margin-top:15px;">
                <label><b>TEST ADMINISTRADOS:</b></label>
                <textarea id="test-admin" placeholder="Escribe aquí..."></textarea>
            </div>
            
            <div style="margin-top:15px;">
                <label><b>RESULTADOS OBTENIDOS E INTERPRETACIÓN DE TEST ADMINISTRADOS:</b></label>
                <textarea id="resultados" placeholder="Escribe aquí..."></textarea>
            </div>
            
            <div style="margin-top:15px;">
                <label><b>SÍNTESIS Y CONCLUSIONES:</b></label>
                <textarea id="sintesis" placeholder="Escribe aquí..."></textarea>
            </div>
            
            <div style="margin-top:15px;">
                <label><b>SUGERENCIAS ESCUELA REGULAR:</b></label>
                <textarea id="sugerencias" placeholder="Escribe aquí..."></textarea>
            </div>

            <div style="display:flex; gap:10px; margin-top:15px; margin-bottom: 25px;">
                <button onclick="generarBorradorIA()" style="flex:1; background:#10b981;">🤖 CORREGIR ORTOGRAFÍA Y PASAR AL EDITOR</button>
                <button onclick="guardarBorrador()" style="flex:1; background:#8b5cf6;">💾 GUARDAR PARCIAL EN NUBE</button>
            </div>

            <hr style="border: 1px solid #e2e8f0; margin-bottom: 20px;">

            <label><b>📝 Editor de Informe Final (Vista Previa Real):</b></label>
            <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">
                Aquí puedes editar fuentes, colores y usar el botón de imagen 🏞️ para insertar firmas y sellos.
            </p>
            
            <div id="editor-container"></div>
            
            <button onclick="exportarPDF()" style="margin-top: 20px; font-size: 16px; padding: 15px; background: #2563eb;">
                📄 DESCARGAR INFORME PDF FINAL
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAugXXx_b_wKFByhDbLZslk2HA_UTzrzd8",
            authDomain: "clinicaintegral-5c488.firebaseapp.com",
            databaseURL: "https://clinicaintegral-5c488-default-rtdb.firebaseio.com",
            projectId: "clinicaintegral-5c488",
            storageBucket: "clinicaintegral-5c488.appspot.com",
            appId: "1:184090967634:web:09715937b33ea48288698b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let pacienteActual = null;
        let datosPacienteCompleto = {};
        let quillEditor;

        // ============================================================
        // INICIALIZACIÓN DEL EDITOR TIPO WORD (QUILL.JS)
        // ============================================================
        window.onload = function() {
            quillEditor = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'align': [] }, { 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['image'], // Botón para insertar imágenes (firmas/sellos)
                        ['clean']
                    ]
                },
                placeholder: 'El texto corregido aparecerá aquí. Puedes modificarlo, cambiar fuentes y pegar firmas...'
            });
        };

        // ============================================================
        // SISTEMA DE LOGIN
        // ============================================================
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                listarPacientes();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

       const provider = new firebase.auth.GoogleAuthProvider();
       function iniciarSesionGoogle() {
           auth.signInWithPopup(provider).then((result) => {
               // Exitoso
           }).catch((error) => {
               console.error("Error al ingresar: ", error);
               alert("No se pudo iniciar sesión: " + error.message);
           });
       }

        function cerrarSesion() {
            auth.signOut();
        }

        // ============================================================
        // 1. LISTAR PACIENTES
        // ============================================================
        function listarPacientes() {
            const mod = document.getElementById('mod').value;
            const select = document.getElementById('paciente-select');
            select.innerHTML = '<option value="">⏳ Cargando pacientes...</option>';
            
            db.ref(mod + '/pacientes').once('value', snap => {
                select.innerHTML = '<option value="">Seleccionar paciente...</option>';
                let count = 0;
                snap.forEach(child => {
                    const pac = child.val();
                    const nombre = child.key;
                    if (pac && nombre) {
                        const option = document.createElement('option');
                        option.value = nombre;
                        option.textContent = nombre + (pac.cud ? ` (CUD: ${pac.cud})` : '');
                        select.appendChild(option);
                        count++;
                    }
                });
                document.getElementById('stats-pacientes').textContent = `👥 ${count} pacientes`;
            }, error => {
                select.innerHTML = '<option value="">❌ Error al cargar pacientes</option>';
            });
        }

        // ============================================================
        // 2. CARGAR DATOS DEL PACIENTE
        // ============================================================
        function cargarDatosPaciente() {
            const select = document.getElementById('paciente-select');
            const nombre = select.value;
            const mod = document.getElementById('mod').value;
            const container = document.getElementById('datos-paciente');
            const infoDiv = document.getElementById('info-paciente');
            
            if (!nombre) { container.style.display = 'none'; return; }
            
            document.getElementById('nombre-paciente').textContent = nombre;
            container.style.display = 'block';
            infoDiv.innerHTML = '<div class="loading">Cargando datos...</div>';
            
            db.ref(mod + '/pacientes/' + nombre).once('value', snap => {
                const datos = snap.val();
                datosPacienteCompleto = datos || {};
                
                let html = '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
                const campos = [
                    { label: '📅 CUD', key: 'cud' },
                    { label: '🏠 Domicilio', key: 'domicilio' },
                    { label: '📋 Diagnóstico', key: 'diagnostico' }
                ];
                
                campos.forEach(c => {
                    if (datos && datos[c.key]) {
                        html += `<tr><td style="padding:4px 8px; font-weight:600; width:120px;">${c.label}</td><td>${datos[c.key]}</td></tr>`;
                    }
                });
                infoDiv.innerHTML = html + '</table>';

                // Limpiar editor y campos al cambiar paciente
                quillEditor.root.innerHTML = '';
                document.getElementById('test-admin').value = '';
                document.getElementById('resultados').value = '';
                document.getElementById('sintesis').value = '';
                document.getElementById('sugerencias').value = '';
            });
        }

        // ============================================================
        // 3. CORREGIR ORTOGRAFÍA ESTRICTA Y CARGAR AL EDITOR
        // ============================================================
        async function generarBorradorIA() {
            const nombre = document.getElementById('paciente-select').value;
            if (!nombre) return alert("Seleccioná un paciente primero");
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Corrigiendo ortografía y concordancia...';
            
            try {
                const test = document.getElementById('test-admin').value;
                const resultados = document.getElementById('resultados').value;
                const sintesis = document.getElementById('sintesis').value;
                const sugerencias = document.getElementById('sugerencias').value;
                
                // INSTRUCCIÓN ESTRICTA BASADA EN TU ESTILO
                const prompt = `Actúa como un corrector ortotipográfico estricto. Señala repeticiones y errores de puntuación, corrige solo comas y errores ortográficos de los siguientes textos, pero no cambies ni una sola palabra del estilo narrativo. Nunca escribas ni una sola sílaba nueva que no esté en el original.

Devuelve el texto corregido estructurado exactamente así en HTML:
<p><strong>TEST ADMINISTRADOS:</strong><br>${test}</p><br>
<p><strong>RESULTADOS OBTENIDOS E INTERPRETACIÓN DE TEST ADMINISTRADOS:</strong><br>${resultados}</p><br>
<p><strong>SÍNTESIS Y CONCLUSIONES:</strong><br>${sintesis}</p><br>
<p><strong>SUGERENCIAS ESCUELA REGULAR:</strong><br>${sugerencias}</p>`;
                
                const respuesta = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-134a123b5eac4922bab50f18fd87bf1b'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.1 // Temperatura baja para que no invente nada
                    })
                });
                
                if (!respuesta.ok) throw new Error("Fallo en IA");
                
                const data = await respuesta.json();
                let htmlGenerado = data.choices[0].message.content;
                
                htmlGenerado = htmlGenerado.replace(/```html/g, '').replace(/```/g, '');
                quillEditor.clipboard.dangerouslyPasteHTML(htmlGenerado);
                
            } catch(e) {
                alert("Hubo un error con la corrección IA. Se pasará el texto tal cual al editor.");
                const htmlEmergencia = `
                    <p><strong>TEST ADMINISTRADOS:</strong><br>${document.getElementById('test-admin').value}</p><br>
                    <p><strong>RESULTADOS OBTENIDOS E INTERPRETACIÓN DE TEST ADMINISTRADOS:</strong><br>${document.getElementById('resultados').value}</p><br>
                    <p><strong>SÍNTESIS Y CONCLUSIONES:</strong><br>${document.getElementById('sintesis').value}</p><br>
                    <p><strong>SUGERENCIAS ESCUELA REGULAR:</strong><br>${document.getElementById('sugerencias').value}</p>
                `;
                quillEditor.clipboard.dangerouslyPasteHTML(htmlEmergencia);
            }
            
            btn.disabled = false;
            btn.textContent = '🤖 CORREGIR ORTOGRAFÍA Y PASAR AL EDITOR';
        }

        // ============================================================
        // 4. EXPORTAR EL CONTENIDO A PDF CON ROTULOS
        // ============================================================
        function exportarPDF() {
            const nombre = document.getElementById('paciente-select').value;
            if (!nombre) return alert("Selecciona un paciente.");
            
            const area = document.getElementById('area-rep').value || '_________________';
            const profesional = document.getElementById('profesional-rep').value || '_________________';
            
            // Datos automáticos
            const anioActual = new Date().getFullYear();
            const fechaHoy = new Date().toLocaleDateString('es-AR');
            
            // Buscar datos de Firebase. Si no existen, pone S/D
            const fechaNac = datosPacienteCompleto.nacimiento || datosPacienteCompleto.nac || datosPacienteCompleto.fechaNacimiento || 'S/D';
            const edad = datosPacienteCompleto.edad || 'S/D';
            const diagnostico = datosPacienteCompleto.diagnostico || datosPacienteCompleto.diag || 'S/D';
            
            const elementoTemporal = document.createElement('div');
            // Tamaño de fuente general y tipografía formal
            elementoTemporal.style.fontFamily = "'Times New Roman', Times, serif"; 
            elementoTemporal.style.fontSize = "14px";
            elementoTemporal.style.padding = "40px";
            elementoTemporal.style.position = "relative";
            elementoTemporal.style.minHeight = "1050px"; // Fuerza el tamaño A4 para que el pie quede abajo
            
            elementoTemporal.innerHTML = `
                <!-- ROTULO SUPERIOR -->
                <div style="display: flex; align-items: flex-end; margin-bottom: 40px;">
                    <h1 style="color: #1a2a6c; margin: 0; font-size: 42px; font-weight: bold; line-height: 0.8; font-family: 'Georgia', serif;">Esencial</h1>
                    <div style="flex-grow: 1; height: 3px; background-color: #1a2a6c; margin-left: 15px; margin-bottom: 6px;"></div>
                </div>

                <!-- TÍTULO -->
                <div style="text-align: center; font-weight: bold; margin-bottom: 30px; font-size: 15px;">
                    <div style="text-decoration: underline;">INFORME PRIMER TRIMESTRE/ PROCESO</div>
                    <div style="margin-top: 5px;">${anioActual}</div>
                </div>

                <!-- DATOS DEL BENEFICIARIO -->
                <ul style="list-style-type: disc; margin-bottom: 40px; padding-left: 40px; line-height: 2.2;">
                    <li><strong>ÁREA:</strong> <span style="text-transform: uppercase;">${area}</span></li>
                    <li><strong>APELLIDO Y NOMBRE DEL BENEFICIARIO:</strong> <span style="text-transform: uppercase;">${nombre}</span></li>
                    <li><strong>FECHA DE NACIMIENTO:</strong> ${fechaNac}</li>
                    <li><strong>EDAD:</strong> ${edad}</li>
                    <li><strong>DIAGNÓSTICO:</strong> ${diagnostico}</li>
                    <li><strong>FECHA DE INFORME:</strong> ${fechaHoy}</li>
                    <li><strong>PROFESIONAL:</strong> <span style="text-transform: uppercase;">${profesional}</span></li>
                </ul>

                <!-- CONTENIDO DEL EDITOR (TESTS, RESULTADOS, ETC) -->
                <div class="contenido-quill" style="line-height: 1.6; padding-left: 15px; padding-right: 15px;">
                    ${quillEditor.root.innerHTML} 
                </div>

                <!-- ROTULO INFERIOR (PIE DE PÁGINA) -->
                <div style="position: absolute; bottom: 0; left: 0; right: 0; font-family: Arial, sans-serif;">
                    <div style="display:flex; justify-content:center; gap: 40px; font-size: 11px; color: #1a2a6c; margin-bottom: 8px;">
                        <div><span style="font-size:13px;">🌐</span> www.esencialsalud.com.ar</div>
                        <div><span style="font-size:13px;">📞</span> 4323086 / 4210238</div>
                    </div>
                    <div style="display:flex; justify-content:center; gap: 40px; font-size: 11px; color: #1a2a6c; margin-bottom: 15px;">
                        <div><span style="font-size:13px;">✉️</span> contacto@esencialsalud.com.ar</div>
                        <div><span style="font-size:13px;">📍</span> 25 de mayo 30 (E) Ciudad de San Juan / Av. Córdoba 585 (O)</div>
                    </div>
                    <div style="background-color: #1a2a6c; height: 35px; border-top-left-radius: 40px; margin-left: 200px;"></div>
                </div>
            `;

            const opciones = {
                margin:       [0, 0, 0, 0], // Sin márgenes en html2pdf para que el pie de página llegue a los bordes
                filename:     `Informe_Trimestral_${nombre.replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opciones).from(elementoTemporal).save().then(() => {
                // Usamos la ruta correcta 'informes_trimestrales'
                db.ref('informes_trimestrales/' + nombre).push({
                    fecha: Date.now(),
                    area: area,
                    profesional: profesional,
                    contenidoHTML: quillEditor.root.innerHTML,
                    modulo: document.getElementById('mod').value
                }).catch(err => {
                    console.error("Error al guardar en Firebase:", err);
                    alert("El PDF se descargó, pero hubo un error al guardar en la nube: " + err.message);
                });
            });

        // ============================================================
        // 5. GUARDAR BORRADOR RÁPIDO EN NUBE
        // ============================================================
        function guardarBorrador() {
            const nombre = document.getElementById('paciente-select').value;
            if (!nombre) return;
            
            db.ref('borradores_trimestrales/' + nombre).set({
                area: document.getElementById('area-rep').value,
                profesional: document.getElementById('profesional-rep').value,
                test: document.getElementById('test-admin').value,
                resultados: document.getElementById('resultados').value,
                sintesis: document.getElementById('sintesis').value,
                sugerencias: document.getElementById('sugerencias').value,
                timestamp: Date.now()
            }).then(() => alert("Borrador parcial guardado en la nube."));
        }
    </script>
</body>
</html>
